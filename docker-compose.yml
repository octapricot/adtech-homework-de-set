services:
  mysql:
    image: mysql:8.0
    container_name: adtech_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: adtech123
      MYSQL_DATABASE: adtech
    ports:
      - "3306:3306"
    volumes:
      - ./sql/01_create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:7.0
    container_name: adtech_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: adtech123
      MONGO_INITDB_DATABASE: adtech
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mysql_data:
  mongo_data: